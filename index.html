<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYRIL Slice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
  font-family: Arial, sans-serif;
  overflow: hidden;
  touch-action: none;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* HUD Score et Vies */
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 50px;
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  z-index: 10;
}

/* Fruits */
.fruit {
  position: absolute;
  font-size: 150px;
  user-select: none;
  pointer-events: none;
}

/* Lettre sur le fruit */
.letter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 72px;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

/* Effet de coupe */
.slice {
  position: absolute;
  width: 60px;
  height: 60px;
  font-size: 50px;
  pointer-events: none;
  animation: sliceAnim 0.5s forwards;
}

@keyframes sliceAnim {
 0% { opacity: 1; transform: scale(1); }
 100% { opacity: 0; transform: scale(1.5) translateY(-20px); }
}

/* Ecrans Menu, Win, Lose */
#startScreen, #winScreen, #loseScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  z-index: 20;
  padding: 20px;
}

#startScreen h1, #winScreen h1, #loseScreen h1 {
  font-size: 90px;
  margin-bottom: 20px;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
}

#startScreen p, #winScreen p, #loseScreen p {
  font-size: 40px;
  margin-bottom: 30px;
}

/* Boutons */
button {
  padding: 30px 60px;
  font-size: 48px;
  margin-top: 20px;
  border: none;
  border-radius: 15px;
  background: #FF6B6B;
  color: white;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:active {
  transform: scale(0.95);
}

/* Mot à former */
#targetWord {
  font-size: 60px;
  letter-spacing: 20px;
  margin: 30px 0;
  font-weight: bold;
}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff3b30">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}
</script>
</head>
<body>
<div id="game">
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Vies: <span id="lives">3</span></div>
  </div>

  <div id="startScreen">
    <h1>CYRIL Slice</h1>
    <p>Glisse ton doigt pour couper dans l'ordre :</p>
    <div id="targetWord">C Y R I L</div>
    <button onclick="startGame()">JOUER</button>
  </div>

  <div id="winScreen" style="display:none;">
    <h1>🎉 Bravo!</h1>
    <p>Tu as formé le mot!</p>
    <button onclick="restartGame()">Rejouer</button>
  </div>

  <div id="loseScreen" style="display:none;">
    <h1>💀 Perdu!</h1>
    <p>Essaie encore!</p>
    <button onclick="restartGame()">Rejouer</button>
  </div>
</div>

<script>
const fruits = ['🍎', '🍌', '🍇', '🍊', '🍓', '🍑', '🍉', '🍍'];

const names = [
  'CYRIL', 'KELVIN', 'NDIMBA', 'VANESSA', 'ANITA',
  'RAÏSA', 'BRUL', 'HERNEST', 'SCOLA', 'JEANNIEL'
];
let currentNameIndex = 0;
let letters = names[currentNameIndex].split('');
let score = 0;
let lives = 3;
let nextLetterIndex = 0;
let gameRunning = false;
let fruitInterval;
let gameArea = document.getElementById('game');
let isDragging = false;

function showCurrentWordOnTitle() {
  document.getElementById('targetWord').textContent = letters.join(' ');
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  gameRunning = true;
  score = 0;
  lives = 3;
  nextLetterIndex = 0;
  updateHUD();
  fruitInterval = setInterval(createFruit, 1100);
}

gameArea.addEventListener('touchstart', e => { isDragging = true; });
gameArea.addEventListener('touchmove', e => { if(isDragging) checkSlice(e.touches[0]); });
gameArea.addEventListener('touchend', () => isDragging = false);

gameArea.addEventListener('mousedown', e => { isDragging = true; });
gameArea.addEventListener('mousemove', e => { if(isDragging) checkSlice(e); });
gameArea.addEventListener('mouseup', () => isDragging = false);

function createFruit() {
  if (!gameRunning) return;

  let fruit = document.createElement('div');
  fruit.className = 'fruit';

  let letter, emoji;
  if (Math.random() < 0.7 && nextLetterIndex < letters.length) {
    letter = letters[nextLetterIndex];
  } else {
    letter = letters[Math.floor(Math.random() * letters.length)];
  }
  emoji = fruits[Math.floor(Math.random() * fruits.length)];

  fruit.innerHTML = `${emoji}<div class="letter">${letter}</div>`;
  fruit.dataset.letter = letter;
  fruit.dataset.cut = "false";

  fruit.style.left = Math.random() * (window.innerWidth - 160) + 'px';
  fruit.style.top = '-160px';

  gameArea.appendChild(fruit);

  let fallSpeed = 2.5 + Math.random() * 2;
  let pos = -160;
  let fall = setInterval(() => {
    if (!gameRunning || fruit.dataset.cut === "true") {
      clearInterval(fall);
      return;
    }
    pos += fallSpeed;
    fruit.style.top = pos + 'px';

    if (pos > window.innerHeight) {
      clearInterval(fall);
      fruit.remove();
      if (letter === letters[nextLetterIndex]) {
        loseLife();
      }
    }
  }, 20);
}

function checkSlice(e) {
  if (!gameRunning) return;
  let x = e.clientX;
  let y = e.clientY;

  document.querySelectorAll('.fruit').forEach(fruit => {
    if (fruit.dataset.cut === "true") return;
    let rect = fruit.getBoundingClientRect();

    if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
      sliceFruit(fruit);
    }
  });
}

function sliceFruit(fruit) {
  fruit.dataset.cut = "true";
  let letter = fruit.dataset.letter;
  let rect = fruit.getBoundingClientRect();

  let slice = document.createElement('div');
  slice.className = 'slice';
  slice.textContent = '✂️';
  slice.style.left = rect.left + 'px';
  slice.style.top = rect.top + 'px';
  gameArea.appendChild(slice);
  setTimeout(() => slice.remove(), 500);

  if (letter === letters[nextLetterIndex]) {
    score += 10;
    nextLetterIndex++;
    updateHUD();
    if (nextLetterIndex >= letters.length) {
      winGame();
    }
  } else {
    loseLife();
  }

  fruit.remove();
}

function loseLife() {
  lives--;
  updateHUD();
  if (lives <= 0) {
    loseGame();
  }
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
}

function winGame() {
  gameRunning = false;
  clearInterval(fruitInterval);
  document.getElementById('winScreen').style.display = 'flex';
  currentNameIndex = (currentNameIndex + 1) % names.length;
  letters = names[currentNameIndex].split('');
  showCurrentWordOnTitle();
  document.querySelector('#winScreen p').textContent = "Tu as formé le mot " + names[(currentNameIndex - 1 + names.length)%names.length] + "!";
}

function loseGame() {
  gameRunning = false;
  clearInterval(fruitInterval);
  document.getElementById('loseScreen').style.display = 'flex';
}

function restartGame() {
  document.getElementById('winScreen').style.display = 'none';
  document.getElementById('loseScreen').style.display = 'none';
  document.querySelectorAll('.fruit,.slice').forEach(f => f.remove());
  document.getElementById('startScreen').style.display = 'flex';
  showCurrentWordOnTitle();
}

showCurrentWordOnTitle();
</script>
</body>
</html>
